name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        working-directory: ./mobile
        run: npm install --legacy-peer-deps

      - name: Install React Native CLI
        working-directory: ./mobile
        run: npm install --save-dev @react-native-community/cli @react-native-community/cli-platform-android --legacy-peer-deps

      - name: Expo prebuild
        working-directory: ./mobile
        run: npx expo prebuild --platform android --clean --no-install

      - name: Make gradlew executable
        working-directory: ./mobile/android
        run: chmod +x gradlew

      - name: Build Debug APK
        working-directory: ./mobile/android
        run: ./gradlew assembleDebug --no-daemon 2>&1 | tee /tmp/gradle-build.log; exit ${PIPESTATUS[0]}
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g"

      - name: Upload build log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          path: /tmp/gradle-build.log
          retention-days: 3

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LifeSimAI-debug.apk
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
