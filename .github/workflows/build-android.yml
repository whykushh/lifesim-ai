name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        working-directory: ./mobile
        run: npm install --legacy-peer-deps

      - name: Install React Native CLI
        working-directory: ./mobile
        run: npm install --save-dev @react-native-community/cli @react-native-community/cli-platform-android --legacy-peer-deps

      - name: Expo prebuild
        working-directory: ./mobile
        run: npx expo prebuild --platform android --clean --no-install

      - name: Generate debug keystore for signing
        run: |
          mkdir -p ~/.android
          keytool -genkeypair -v \
            -keystore ~/.android/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US" \
            -storepass android -keypass android

      - name: Configure release to use debug signing
        working-directory: ./mobile/android/app
        run: |
          python3 << 'PYEOF'
          with open('build.gradle', 'r') as f:
              c = f.read()

          # Find the buildTypes block and inject signingConfig into release
          bt_idx = c.find('buildTypes {')
          if bt_idx == -1:
              print("ERROR: buildTypes block not found")
              exit(1)

          rel_idx = c.find('release {', bt_idx)
          if rel_idx == -1:
              print("ERROR: release block not found inside buildTypes")
              exit(1)

          insert_pos = rel_idx + len('release {')
          injection = '\n            signingConfig signingConfigs.debug'

          if 'signingConfig signingConfigs.debug' not in c[rel_idx:rel_idx+200]:
              c = c[:insert_pos] + injection + c[insert_pos:]
              with open('build.gradle', 'w') as f:
                  f.write(c)
              print("Patched: release buildType now uses debug signing")
          else:
              print("Already patched, skipping")
          PYEOF

      - name: Make gradlew executable
        working-directory: ./mobile/android
        run: chmod +x gradlew

      - name: Build Release APK (JS bundled automatically)
        working-directory: ./mobile/android
        run: ./gradlew assembleRelease --no-daemon 2>&1 | tee /tmp/gradle-build.log; exit ${PIPESTATUS[0]}
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g"

      - name: Upload build log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          path: /tmp/gradle-build.log
          retention-days: 3

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LifeSimAI.apk
          path: mobile/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 7
