name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        working-directory: ./mobile
        run: npm install --legacy-peer-deps

      - name: Expo prebuild
        working-directory: ./mobile
        run: npx expo prebuild --platform android --clean --no-install

      - name: Generate keystore
        run: |
          keytool -genkeypair -v \
            -keystore /tmp/release.keystore \
            -alias release \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=LifeSim,O=LifeSim,C=US" \
            -storepass android123 -keypass android123

      - name: Inject signing config into build.gradle
        working-directory: ./mobile/android/app
        run: |
          python3 << 'PYEOF'
          with open('build.gradle', 'r') as f:
              c = f.read()
          signing = """
              signingConfigs {
                  release {
                      storeFile file("/tmp/release.keystore")
                      storePassword "android123"
                      keyAlias "release"
                      keyPassword "android123"
                  }
              }
          """
          c = c.replace('    buildTypes {', signing + '    buildTypes {', 1)
          # inject signingConfig into release buildType
          import re
          c = re.sub(r'(buildTypes \{[^}]*release \{)', r'\1\n            signingConfig signingConfigs.release', c, count=1)
          with open('build.gradle', 'w') as f:
              f.write(c)
          print("Done patching build.gradle")
          PYEOF

      - name: Make gradlew executable
        working-directory: ./mobile/android
        run: chmod +x gradlew

      - name: Build Release APK
        working-directory: ./mobile/android
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LifeSimAI.apk
          path: mobile/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 7
